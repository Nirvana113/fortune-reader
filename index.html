<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chinese Fortune Reader</title>
<style>
body{font-family:Arial;background:linear-gradient(135deg,#1a1a2e,#16213e);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
.container{background:#fff;padding:30px;border-radius:15px;max-width:450px}
h1{text-align:center;color:#8B0000}
input,select{width:100%;padding:10px;margin-bottom:15px;border:1px solid #ddd;border-radius:5px}
button{width:100%;padding:12px;background:#8B0000;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer}
#result{display:none;margin-top:20px}
.box{background:#f9f9f9;padding:12px;margin-bottom:8px;border-radius:5px}
</style>
</head>
<body>
<div class="container">
<h1>Chinese Fortune Reader</h1>
<input type="number" id="year" placeholder="Birth Year (1990)">
<select id="month"><option value="">Select Month</option><option value="1">January</option><option value="2">February</option><option value="3">March</option><option value="4">April</option><option value="5">May</option><option value="6">June</option><option value="7">July</option><option value="8">August</option><option value="9">September</option><option value="10">October</option><option value="11">November</option><option value="12">December</option></select>
<input type="number" id="day" placeholder="Day (1-31)">
<input type="number" id="hour" placeholder="Birth Hour (0-23)">
<button onclick="calc()">Get My Fortune</button>
<div id="result">
<div class="box"><b>Zodiac:</b> <span id="z"></span> (<span id="zc"></span>)</div>
<div class="box"><b>Element:</b> <span id="e"></span></div>
<div class="box"><b>Western:</b> <span id="w"></span></div>
<div class="box"><b>Personality:</b> <span id="p"></span></div>
<div class="box"><b>Career:</b> <span id="c"></span></div>
<div class="box"><b>Wealth:</b> <span id="wl"></span></div>
<div class="box"><b>Love:</b> <span id="lv"></span></div>
<div class="box"><b>2026:</b> <span id="f"></span></div>
<div class="box"><b>Lucky:</b> <span id="ln"></span></div>
</div>
</div>
<script>
var ze=["Rat","Ox","Tiger","Rabbit","Dragon","Snake","Horse","Goat","Monkey","Rooster","Dog","Pig"];
var zc=["鼠","牛","虎","兔","龙","蛇","马","羊","猴","鸡","狗","猪"];
var el=["Wood","Fire","Earth","Metal","Water"];
var ps=["Creative","Wise","Courageous","Compassionate","Leader","Diplomatic","Analytical","Spiritual"];
var cs=["Creative","Leadership","Technical","Helping","Business","Academic"];
var wl=["Steady","Investment","Profit","Advancement","Opportunity","Wisdom"];
var lv=["Adventure","Stable","Self-love","New","Deep","Travel"];
var ft=["Transformation","Growth","Opportunities","Relationships","Advancement","Reflection"];
function gZ(y){return[ze[(y-1900)%12],zc[(y-1900)%12]];}
function gE(y){var i=(y-1900)%10;return el[i<5?Math.floor(i/2):Math.floor((i-5)/2)+2];}
function gW(m,d){
var s=[{s:"Capricorn",e:1,ed:19},{s:"Aquarius",e:1,ed:20},{s:"Pisces",e:2,ed:19},{s:"Aries",e:3,ed:20},{s:"Taurus",e:4,ed:20},{s:"Gemini",e:5,ed:20},{s:"Cancer",e:6,ed:21},{s:"Leo",e:7,ed:22},{s:"Virgo",e:8,ed:22},{s:"Libra",e:9,ed:22},{s:"Scorpio",e:10,ed:22},{s:"Sagittarius",e:11,ed:21}];
for(var i=0;i<s.length;i++){if(m<s[i].e||(m==s[i].e&&d<=s[i].ed))return s[i].s;}return"Capricorn";}
function seed(y,m,d,h){var str=""+y+m+d+h;var h=0;for(var i=0;i<str.length;i++)h=((h<<5)-h)+str.charCodeAt(i);return Math.abs(h);}
function pick(a,s){return a[Math.abs(s)%a.length];}
function calc(){
var y=parseInt(document.getElementById('year').value);
var m=parseInt(document.getElementById('month').value);
var d=parseInt(document.getElementById('day').value);
var h=parseInt(document.getElementById('hour').value)||12;
if(!y||!m||!d){alert("Please fill all fields!");return;}
var s=seed(y,m,d,h);
var z=gZ(y);
document.getElementById('z').innerText=z[0];
document.getElementById('zc').innerText=z[1];
document.getElementById('e').innerText=gE(y);
document.getElementById('w').innerText=gW(m,d);
document.getElementById('p').innerText=pick(ps,s);
document.getElementById('c').innerText=pick(cs,s+1);
document.getElementById('wl').innerText=pick(wl,s+2);
document.getElementById('lv').innerText=pick(lv,s+3);
document.getElementById('f').innerText=pick(ft,s+5);
var n=[];for(var i=0;i<5;i++)n.push((Math.abs(s*i)%99)+1);
document.getElementById('ln').innerText=n.join(" - ");
document.getElementById('result').style.display="block";}
</script>
</body>
</html>
