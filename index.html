<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chinese Fortune Reader - Free Fortune Reading</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
.container{background:rgba(255,255,255,0.95);border-radius:20px;padding:40px;max-width:500px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
h1{text-align:center;color:#8B0000;margin-bottom:10px;font-size:28px}
.subtitle{text-align:center;color:#666;margin-bottom:30px;font-size:14px}
.form-group{margin-bottom:20px}
label{display:block;margin-bottom:8px;color:#333;font-weight:600}
input,select{width:100%;padding:12px;border:2px solid #ddd;border-radius:10px;font-size:16px}
input:focus,select:focus{outline:none;border-color:#8B0000}
.row{display:flex;gap:10px}
.row .form-group{flex:1}
button{width:100%;padding:15px;background:linear-gradient(135deg,#8B0000,#CD5C5C);color:white;border:none;border-radius:10px;font-size:18px;font-weight:bold;cursor:pointer}
button:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(139,0,0,0.3)}
.result{margin-top:30px;text-align:center;display:none}
.result img{max-width:100%;border-radius:10px}
.disclaimer{text-align:center;margin-top:20px;font-size:12px;color:#999}
</style>
</head>
<body>
<div class="container">
<h1>🌟 Chinese Fortune Reader 🌟</h1>
<p class="subtitle">Based on Chinese Zodiac & Western Astrology</p >
<div class="form-group"><label>📅 Birth Year</label><input type="number" id="year" placeholder="e.g., 1990" min="1900" max="2025"></div>
<div class="row"><div class="form-group"><label>📆 Month</label><select id="month"><option value="">Select</option><option value="1">January</option><option value="2">February</option><option value="3">March</option><option value="4">April</option><option value="5">May</option><option value="6">June</option><option value="7">July</option><option value="8">August</option><option value="9">September</option><option value="10">October</option><option value="11">November</option><option value="12">December</option></select></div>
<div class="form-group"><label>📅 Day</label><input type="number" id="day" placeholder="1-31" min="1" max="31"></div></div>
<div class="form-group"><label>🕐 Birth Hour (0-23)</label><input type="number" id="hour" placeholder="e.g., 9" min="0" max="23"></div>
<button onclick="generateFortune()" id="btn">🔮 Get My Fortune</button>
<div class="result" id="result">< img id="fortuneImage" src="" alt="Your Fortune"></div>
<p class="disclaimer">This is for entertainment purposes only.</p >
</div>
<script>
async function generateFortune(){
const year=document.getElementById('year').value;
const month=document.getElementById('month').value;
const day=document.getElementById('day').value;
const hour=document.getElementById('hour').value||'12';
if(!year||!month||!day){alert('Please fill in all fields!');return}
const btn=document.getElementById('btn');
const result=document.getElementById('result');
const img=document.getElementById('fortuneImage');
btn.disabled=true;btn.textContent='Generating...';
try{
const response=await fetch('https://fortune-reader.vercel.app/api/fortune',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({year,month,day,hour})});
img.src=URL.createObjectURL(await response.blob());
result.style.display='block'
}catch(e){alert('Error generating fortune. Please try again.')}
btn.disabled=false;btn.textContent='🔮 Get My Fortune'}
</script>
</body>
</html>
